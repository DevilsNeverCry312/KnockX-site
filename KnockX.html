<!DOCTYPE html>
<html>
<head>
  <title>KnockX Network</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a0a0a, #000000);
      color: white;
      text-align: center;
    }

    .container {
      padding: 100px 20px;
    }

    h1 {
      font-size: 60px;
      background: linear-gradient(90deg, #38bdf8, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    .roles {
      margin-top: 60px;
    }

    .role {
      display: inline-block;
      margin: 15px;
      padding: 25px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      width: 220px;
      transition: 0.3s;
    }

    .role:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #38bdf8;
    }

    button {
      margin-top: 50px;
      padding: 15px 40px;
      font-size: 18px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #38bdf8;
    }

    footer {
      margin-top: 100px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>KnockX</h1>
    <p>Elite PvP Experience. Only the strongest survive.</p>

    <div class="roles">
      <div class="role">
        <h3>Moderator</h3>
        <p>Maintain order</p>
      </div>

      <div class="role">
        <h3>Sr Moderator</h3>
        <p>Lead the staff</p>
      </div>

      <div class="role">
        <h3>Sr Script</h3>
        <p>Control systems</p>
      </div>

      <div class="role">
        <h3>Media</h3>
        <p>Create content</p>
      </div>
    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfmUJpV-j0B4RiUXbYIQgfFiLR3K7chPmLmTtmugRHj5YD2Dg/viewform?usp=dialog">
      <button>Apply Now</button>
    </a>

    <footer>
      © KnockX Network
    </footer>
  </div>

</body>
</html>
